name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/main-snap.yml"
      - ".python-version"
      - "pyproject.toml"
      - "snap/**"
      - "src/**"
      - "uv.lock"
  pull_request:
    paths:
      - ".github/workflows/main-snap.yml"
      - ".python-version"
      - "pyproject.toml"
      - "snap/**"
      - "src/**"
      - "uv.lock"
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Snap channel, e.g. latest/edge (empty = no publish)"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Validate uv package
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync locked environment
        run: uv sync --frozen

      - name: Check CLI version
        run: uv run python -m rundfunk --version

      - name: Build package artifacts
        run: uv build

  package-oldest-supported:
    name: Build wheel on Python 3.8
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        run: python -m build --wheel

  build-amd64:
    name: Build core20 snap (amd64)
    needs:
      - package
      - package-oldest-supported
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build snap
        id: snapcraft
        uses: snapcore/action-build@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.STORE_LOGIN }}
        with:
          snapcraft-channel: stable

      - name: Upload snap artifacts
        uses: actions/upload-artifact@v6
        with:
          name: main-snap-amd64-${{ github.sha }}
          path: ${{ steps.snapcraft.outputs.snap }}
          if-no-files-found: error

  build-arm64:
    name: Build core20 snap (arm64)
    if: github.event_name != 'pull_request'
    needs:
      - package
      - package-oldest-supported
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build snap
        id: snapcraft
        uses: snapcore/action-build@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.STORE_LOGIN }}
        with:
          snapcraft-channel: stable

      - name: Upload snap artifacts
        uses: actions/upload-artifact@v6
        with:
          name: main-snap-arm64-${{ github.sha }}
          path: ${{ steps.snapcraft.outputs.snap }}
          if-no-files-found: error

  publish:
    name: Publish to Snap Store
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_channel != ''
    runs-on: ubuntu-22.04
    needs:
      - build-amd64
      - build-arm64
    environment: main-release

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          pattern: main-snap-*-${{ github.sha }}
          merge-multiple: true
          path: dist

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic --channel=stable

      - name: Login to Snap Store
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.STORE_LOGIN }}
        run: |
          login_file="$RUNNER_TEMP/store-login.txt"
          printf '%s' "$SNAPCRAFT_STORE_CREDENTIALS" > "$login_file"
          snapcraft login --with "$login_file"

      - name: Publish all built snaps
        run: |
          set -eu
          channel='${{ github.event.inputs.release_channel }}'
          shopt -s nullglob
          snaps=(dist/*.snap)
          if [ "${#snaps[@]}" -eq 0 ]; then
            echo "No snap files found in dist/"
            exit 1
          fi
          for snap in "${snaps[@]}"; do
            echo "Publishing $snap to $channel"
            snapcraft upload --release "$channel" "$snap"
          done

      - name: Logout from Snap Store
        if: always()
        run: snapcraft logout || true
